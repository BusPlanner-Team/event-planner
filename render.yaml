services:
  - type: web
    name: events-planner
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind=0.0.0.0:$PORT --timeout 600 --workers 1 wsgi:app
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DATABASE_PATH
        value: "/data/event_planner.db"
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_NOTIFICATION_CHANNEL
        sync: false
      - key: MAILCHIMP_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NOTIFICATION_CHECK_MINUTES
        value: "30"
      - key: ESCALATION_CHECK_MINUTES
        value: "15"
      - key: TIMEZONE
        value: "US/Eastern"
    disk:
      name: event-planner-data
      mountPath: /data
      sizeGB: 1
